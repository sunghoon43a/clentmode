<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist — Ethergalleries</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></link>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ETHERGALLERIES — EDITORIAL MAGAZINE THEME
   Artist Profile · Blue · White · Ink
═══════════════════════════════════════ */
:root {
  --vx-primary: #22c55e;
  --vx-primary-hover: #4ade80;
  --vx-blue: #22c55e;
  --vx-dark: #1a1a2e;
  --vx-light: #f8fafc;
  --vx-card-bg: #ffffff;
  --vx-border: #e2e8f0;
  --vx-text: #1e293b;
  --vx-text-muted: #64748b;

  --ink: #0a0a0f;
  --paper: #f7f8fc;
  --paper-light: #e8eaf5;
  --accent: #22c55e;
  --accent-dark: #16a34a;
  --muted: #64748b;
  --border: #e2e8f0;
  --border-dark: #1a2236;
  --white: #ffffff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: "DM Sans", sans-serif; background: var(--paper); color: var(--ink); font-size: 15px; line-height: 1.6; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; height: auto; }
::selection { background: rgba(34,197,94,0.18); color: var(--ink); }

body::after {
  content: ""; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.02; pointer-events: none; z-index: 9999;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: rgba(34,197,94,0.25); border-radius: 3px; }

/* ════════════════════════════════════
   MOBILE NAVBAR — shared across pages
════════════════════════════════════ */
.mainHeader {
  background: var(--ink); border-bottom: 1px solid var(--border-dark);
  position: sticky; top: 0; z-index: 1000;
}
.hdr-row {
  max-width: 1280px; margin: 0 auto;
  padding: 0 1.25rem; height: 58px;
  display: flex; align-items: center; gap: 1rem;
}
.brandLogo {
  font-family: "Playfair Display", serif; font-style: italic; font-size: 1.4rem;
  color: var(--indigo-muted, #86efac); text-decoration: none;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.navigationMenu { display: flex; align-items: center; gap: 32px; }
.navLink, .navDropdown {
  color: rgba(247,248,252,0.6); font-family: "DM Mono", monospace; font-size: 11px;
  font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; cursor: pointer; background: none; border: none;
  transition: color 0.2s; position: relative;
}
.navLink::after, .navDropdown::after {
  content: ""; position: absolute; bottom: -2px; left: 0; right: 100%;
  height: 1px; background: var(--accent); transition: right 0.3s;
}
.navLink:hover::after, .navDropdown:hover::after { right: 0; }
.navLink:hover, .navDropdown:hover { color: #fff; }

/* desktop search */
.hdr-srch {
  flex: 1; max-width: 440px; position: relative;
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(34,197,94,0.25); border-radius: 2px; padding: 8px 14px;
  transition: border-color 0.2s;
}
.hdr-srch:focus-within { border-color: rgba(34,197,94,0.55); }
.hdr-srch svg { width: 18px; height: 18px; opacity: 0.5; flex-shrink: 0; color: #86efac; }
.hdr-srch input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #f7f8fc; font-family: "DM Sans", sans-serif; font-size: 13px;
}
.hdr-srch input::placeholder { color: rgba(247,248,252,0.35); }
.hdr-srch-kbd {
  background: rgba(34,197,94,0.2); color: #86efac;
  font-family: "DM Mono", monospace; font-size: 10px; border-radius: 2px; padding: 3px 6px;
}
/* search dropdown */
.hdr-srch-drop {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 4px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.15); max-height: 400px; overflow-y: auto;
  display: none; z-index: 1200;
}
.hdr-srch-drop.show { display: block; }
.srch-lbl { padding: 8px 14px; font-family: "DM Mono", monospace; font-size: 9px; font-weight: 500; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.12em; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.srch-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background 0.15s; text-decoration: none; color: #1e293b; }
.srch-item:hover { background: #f8fafc; }
.srch-item img { width: 44px; height: 44px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
.srch-item h6 { margin: 0; font-weight: 600; font-size: 12.5px; }
.srch-item small { color: #64748b; font-size: 11px; }
.srch-av { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0; }

/* sign in button */
.signInButton {
  background: var(--accent); color: #000;
  font-family: "DM Mono", monospace; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  border: none; border-radius: 2px; padding: 10px 22px; cursor: pointer;
  transition: background 0.2s; margin-left: auto; flex-shrink: 0;
}
.signInButton:hover { background: var(--accent-dark, #16a34a); }
.headerActions { display: flex; align-items: center; gap: 16px; }

/* hamburger */
.hdr-burger {
  display: none; width: 36px; height: 36px; border-radius: 8px;
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 1.1rem;
  margin-left: auto; flex-shrink: 0; transition: background 0.15s;
}
.hdr-burger:hover { background: rgba(255,255,255,0.08); }
.hdr-burger.open { background: rgba(255,255,255,0.1); }

/* mobile search bar */
.mob-search-bar {
  display: none; padding: 0.625rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.08); background: var(--ink);
}
.mob-srch-wrap { position: relative; }
.mob-srch-wrap svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.45; color: #86efac; }
.mob-srch-wrap input {
  width: 100%; padding: 0.6rem 1rem 0.6rem 2.25rem;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; color: #f7f8fc; font-family: "DM Sans", sans-serif; font-size: 14px;
}
.mob-srch-wrap input:focus { outline: none; border-color: rgba(34,197,94,0.5); }
.mob-srch-wrap input::placeholder { color: rgba(247,248,252,0.35); }
.mob-srch-drop {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  box-shadow: 0 10px 32px rgba(0,0,0,0.2); max-height: 320px; overflow-y: auto;
  display: none; z-index: 999;
}
.mob-srch-drop.show { display: block; }

/* drawer */
.mob-drawer { display: none; position: fixed; top: 58px; left: 0; right: 0; bottom: 0; z-index: 898; }
.mob-drawer.open { display: block; }
.mob-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); animation: mobFade .2s ease; }
@keyframes mobFade { from{opacity:0;} to{opacity:1;} }
.mob-panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(270px, 80vw); background: var(--ink);
  border-left: 1px solid rgba(255,255,255,0.1);
  padding: 1rem 0.875rem; display: flex; flex-direction: column; gap: 0.125rem;
  animation: mobSlide .25s ease; overflow-y: auto;
}
@keyframes mobSlide { from{transform:translateX(100%);} to{transform:translateX(0);} }
.mob-label {
  font-family: "DM Mono", monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: rgba(247,248,252,0.3);
  padding: 0.75rem 0.875rem 0.375rem; margin-top: 0.25rem;
}
.mob-link {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.8rem 0.875rem; border-radius: 8px;
  color: rgba(247,248,252,0.7); font-size: 0.925rem; font-weight: 500;
  text-decoration: none; border: none; background: transparent;
  cursor: pointer; font-family: "DM Sans", sans-serif; width: 100%; text-align: left;
  transition: background 0.15s, color 0.15s;
}
.mob-link:hover { background: rgba(255,255,255,0.07); color: #fff; }
.mob-link i { font-size: 1rem; color: rgba(247,248,252,0.4); width: 20px; text-align: center; flex-shrink: 0; }
.mob-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 0.5rem 0; }
.mob-cta-row { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.08); }
.mob-signup {
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.8rem; border-radius: 8px;
  background: var(--accent); color: #000;
  font-size: 0.925rem; font-weight: 700;
  text-decoration: none; transition: background 0.2s;
}
.mob-signup:hover { background: var(--accent-dark, #16a34a); color: #000; }

/* breakpoints */
@media (max-width: 860px) {
  .navigationMenu { display: none; }
  .hdr-srch { display: none; }
  .headerActions { display: none; }
  .signInButton { display: none; }
  .hdr-burger { display: flex; }
}
@media (min-width: 861px) {
  .mob-drawer, .mob-search-bar, .hdr-burger { display: none !important; }
}
@media (max-width: 420px) {
  .brandLogo img { width: 90px !important; height: 30px !important; }
}
 .mainHeader { padding: 0 20px; } }

/* ── COVER ── */
.cover {
  position: relative; width: 100%; height: 300px; overflow: hidden;
  background: var(--ink);
}
.cover-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.5; }
.cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(10,10,15,0.2) 0%, rgba(10,10,15,0.75) 100%);
}
.cover-glow {
  position: absolute; border-radius: 50%; pointer-events: none; filter: blur(90px);
}
.cg1 { width: 500px; height: 500px; background: rgba(34,197,94,0.25); opacity: 0.4; top: -180px; left: -80px; }
.cg2 { width: 350px; height: 350px; background: rgba(34,197,94,0.2); opacity: 0.3; bottom: -100px; right: -60px; }

/* ── PROFILE ZONE ── */
.profile-zone { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
.profile-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: flex-start; padding-bottom: 40px; }

/* Avatar */
.av-wrap { display: flex; flex-direction: column; align-items: center; margin-top: -70px; position: relative; z-index: 2; }
.av-ring {
  width: 130px; height: 130px; border-radius: 50%;
  border: 5px solid var(--paper);
  box-shadow: 0 0 0 2px var(--accent), 0 10px 36px rgba(0,0,0,0.18);
  overflow: hidden; background: var(--paper-light); flex-shrink: 0;
}
.av-ring img { width: 100%; height: 100%; object-fit: cover; display: block; }
.av-init {
  width: 100%; height: 100%; font-size: 2.4rem; font-weight: 700;
  font-family: "Playfair Display", serif; color: #fff;
  background: linear-gradient(135deg, var(--accent) 0%, #22c55e 100%);
  display: flex; align-items: center; justify-content: center; border-radius: 50%;
  text-transform: uppercase;
}

/* Stats left */
.stats-left { padding-top: 20px; }
.stat-item { margin-bottom: 20px; }
.stat-val { font-family: "Playfair Display", serif; font-size: 2rem; font-weight: 700; line-height: 1; color: var(--ink); }
.stat-lbl { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* Artist Info right */
.artist-info { padding-top: 20px; }
.artist-name { font-family: "Playfair Display", serif; font-size: 2rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.artist-bio { color: var(--muted); font-size: 14px; line-height: 1.7; max-width: 480px; margin-bottom: 20px; }
.artist-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-follow {
  background: var(--accent); color: #fff;
  font-family: "DM Mono", monospace; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: none; border-radius: 2px; padding: 10px 24px; cursor: pointer; transition: background 0.2s;
}
.btn-follow:hover { background: var(--accent-dark); }
.btn-follow.following { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
.btn-share {
  background: transparent; color: var(--muted);
  font-family: "DM Mono", monospace; font-size: 10px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 2px; padding: 10px 20px; cursor: pointer; transition: all 0.2s;
}
.btn-share:hover { border-color: var(--ink); color: var(--ink); }

/* ── MAIN CONTENT ── */
.main-content { max-width: 1280px; margin: 0 auto; padding: 40px 40px 80px; }

/* Featured */
.featured-section { margin-bottom: 56px; }
.section-head { margin-bottom: 28px; }
.section-eyebrow {
  font-family: "DM Mono", monospace; font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.section-eyebrow::before { content: ""; display: block; width: 20px; height: 1px; background: var(--accent); }
.section-title { font-family: "Playfair Display", serif; font-size: 1.6rem; font-weight: 700; color: var(--ink); }

.featured-artwork {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  background: var(--white); border: 1px solid var(--border); border-radius: 3px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(34,197,94,0.08);
}
@media (max-width: 768px) { .featured-artwork { grid-template-columns: 1fr; } }
.featured-image { width: 100%; height: 420px; object-fit: cover; display: block; }
.featured-info { padding: 36px 32px; display: flex; flex-direction: column; justify-content: center; }
.featured-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(34,197,94,0.08); color: var(--accent);
  font-family: "DM Mono", monospace; font-size: 9px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 1px; border: 1px solid rgba(34,197,94,0.2);
  margin-bottom: 16px; width: fit-content;
}
.featured-title { font-family: "Playfair Display", serif; font-size: 1.7rem; font-weight: 700; line-height: 1.2; margin-bottom: 10px; }
.featured-desc { color: var(--muted); font-size: 14px; line-height: 1.7; margin-bottom: 24px; }
.featured-price { font-family: "Playfair Display", serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; }
.featured-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; background: var(--accent); color: white;
  font-family: "DM Mono", monospace; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; border-radius: 2px; transition: background 0.2s; width: fit-content;
}
.featured-btn:hover { background: var(--accent-dark); color: white; }

/* NFT Grid */
.vx-nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
@media (max-width: 576px) { .vx-nft-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

.vx-nft-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 3px;
  overflow: hidden; transition: all 0.25s; cursor: pointer;
  text-decoration: none; color: inherit; display: block;
}
.vx-nft-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: inherit; }
.vx-nft-image-container { position: relative; padding-top: 100%; overflow: hidden; }
.vx-nft-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.vx-nft-card:hover .vx-nft-image { transform: scale(1.05); }
.vx-nft-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--accent); color: #fff;
  font-family: "DM Mono", monospace; font-size: 9px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 1px;
}
.vx-nft-badge.auction { background: #d97706; }
.vx-nft-content { padding: 14px 16px; }
.vx-nft-title { font-family: "Playfair Display", serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vx-nft-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
.vx-nft-price { font-weight: 700; font-size: 0.9rem; }
.vx-nft-price small { font-weight: 400; color: var(--muted); display: block; font-size: 10px; font-family: "DM Mono", monospace; }
.vx-nft-likes { display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 12px; font-family: "DM Mono", monospace; }

/* Empty / Loading */
.vx-loading { text-align: center; padding: 80px 24px; color: var(--muted); }
.vx-loading-spinner { font-size: 2.5rem; display: block; margin-bottom: 16px; animation: spin 1.5s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.vx-empty-state { text-align: center; padding: 64px 24px; color: var(--muted); grid-column: 1/-1; }
.vx-empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.25; display: block; }
.vx-empty-state h4 { font-family: "Playfair Display", serif; }

/* Back link */
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }

/* Footer */
.vx-footer { background: var(--ink); color: white; padding: 40px 0; margin-top: 0; border-top: 1px solid var(--border-dark); }
.vx-footer-brand { font-family: "Playfair Display", serif; font-style: italic; font-size: 1.3rem; color: #86efac; margin-bottom: 8px; }
.vx-footer-copy { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.07); }

/* Responsive */
@media (max-width: 900px) {
  .profile-row { grid-template-columns: 1fr; }
  .stats-left { display: flex; gap: 24px; padding-top: 0; }
  .av-wrap { margin-top: -60px; }
  .profile-zone { padding: 0 20px; }
  .main-content { padding: 32px 20px 60px; }
}
@media (max-width: 600px) {
  .featured-artwork { grid-template-columns: 1fr; }
  .featured-image { height: 260px; }
}

async function doSearchDrop(q, dropEl) {
  if (!q || q.length < 2) { if(dropEl)dropEl.classList.remove('show'); return; }
  try {
    const res = await fetch(`https://changes-sample.onrender.com/api/marketplace/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error();
    const results = await res.json();
    if (!results.length) { if(dropEl){dropEl.innerHTML='<div style="padding:12px;color:#64748b;text-align:center;font-size:13px;">No results found</div>';dropEl.classList.add('show');} return; }
    const artists=[...new Set(results.map(n=>n.creator).filter(Boolean))].filter(a=>a.toLowerCase().includes(q.toLowerCase())).slice(0,2);
    let h='';
    if(artists.length){h+='<div class="srch-lbl">Artists</div>';h+=artists.map(a=>`<a href="artist.html?name=${encodeURIComponent(a)}" class="srch-item"><div class="srch-av">${a[0].toUpperCase()}</div><div><h6>${a}</h6><small>View Profile</small></div></a>`).join('');}
    h+='<div class="srch-lbl">Artworks</div>';
    h+=results.slice(0,5).map(n=>`<a href="artwork.html?id=${n._id}" class="srch-item"><img src="${n.imageUrl||''}" alt="${n.name||''}"><div><h6>${n.name||'Untitled'}</h6><small>by ${n.creator||'Unknown'}</small></div></a>`).join('');
    if(dropEl){dropEl.innerHTML=h;dropEl.classList.add('show');}
  } catch(e){console.error(e);}
}

</script>
<script>
let artistName = '';
let artistNFTs = [];
let featuredNFT = null;

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  artistName = params.get('name');
  if (artistName) {
    artistName = decodeURIComponent(artistName);
    loadArtistProfile();
  } else {
    document.getElementById('pageContent').innerHTML = `
      <div class="vx-loading">
        <i class="bi bi-exclamation-circle" style="font-size:2.5rem;display:block;margin-bottom:16px;color:#ef4444;"></i>
        <p style="font-family:'DM Mono',monospace;font-size:12px;color:#64748b;">Artist not found</p>
        <a href="/index.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:#22c55e;color:white;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border-radius:2px;">← Back to Marketplace</a>
      </div>`;
  }
});

async function loadArtistProfile() {
  try {
    const resNFTs = await fetch('https://changes-sample.onrender.com/api/marketplace/nfts');
    if (!resNFTs.ok) throw new Error('Failed to load NFTs');
    const allNFTs = await resNFTs.json();
    const creatorEmail = localStorage.getItem('creatorEmail');
    artistNFTs = [];
    if (!creatorEmail) {
      const resUser = await fetch(`https://changes-sample.onrender.com/api/user/avatar/${artistName}`);
      if (!resUser.ok) throw new Error('Failed to load artist');
      const data = await resUser.json();
      artistNFTs = allNFTs.filter(nft => nft.owner === data.email);
    } else {
      artistNFTs = allNFTs.filter(nft => nft.owner === creatorEmail);
    }
    if (!artistNFTs.length) { document.getElementById('pageContent').innerHTML = `<div class="vx-loading"><p>No artworks found for this artist.</p></div>`; return; }
    featuredNFT = artistNFTs[Math.floor(Math.random() * artistNFTs.length)];
    document.title = `${artistName} — Ethergalleries`;
    renderProfile();
  } catch (err) { console.error(err); }
}

async function loadArtistProfileAvatar() {
  try {
    const params = new URLSearchParams(window.location.search);
    const username = params.get('name');
    const res = await fetch(`https://changes-sample.onrender.com/api/user/avatar/${username}`, { method: 'GET', headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    return data.profileImage;
  } catch (err) { return null; }
}

async function loadArtistBio() {
  try {
    const res = await fetch(`https://changes-sample.onrender.com/api/user/bio/${artistName}`);
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    return data.bio || '';
  } catch (err) { return ''; }
}

async function renderProfile() {
  try {
    const avatarUrl = await loadArtistProfileAvatar();
    const bio = await loadArtistBio();
    const initial = artistName[0]?.toUpperCase() || '?';
    const totalLikes = artistNFTs.reduce((sum, n) => sum + (n.likes || 0), 0);
    const totalViews = artistNFTs.reduce((sum, n) => sum + (n.views || 0), 0);
    const listedNFTs = artistNFTs.filter(n => n.status === 'listed');

    document.getElementById('pageContent').innerHTML = `
      <!-- Cover -->
      <div class="cover">
        <img src="https://images.unsplash.com/photo-1634973357973-f2ed2657db3c?w=1600&auto=format&fit=crop" alt="" class="cover-img">
        <div class="cover-overlay"></div>
        <div class="cover-glow cg1"></div>
        <div class="cover-glow cg2"></div>
      </div>

      <!-- Profile Row -->
      <div class="profile-zone">
        <div class="profile-row">
          <!-- Stats Left -->
          <div class="stats-left">
            <div class="stat-item">
              <div class="stat-val">${artistNFTs.length}</div>
              <div class="stat-lbl">Artworks</div>
            </div>
            <div class="stat-item">
              <div class="stat-val">${listedNFTs.length}</div>
              <div class="stat-lbl">For Sale</div>
            </div>
          </div>

          <!-- Avatar Center -->
          <div class="av-wrap">
            <div class="av-ring">
              ${avatarUrl ? `<img src="${avatarUrl}" alt="${initial}">` : `<div class="av-init">${initial}</div>`}
            </div>
          </div>

          <!-- Info Right -->
          <div class="artist-info">
            <a href="javascript:history.back()" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back</a>
            <h1 class="artist-name">${artistName}</h1>
            ${bio ? `<p class="artist-bio">${bio}</p>` : ''}
            <div style="display:flex;gap:24px;margin-bottom:20px;">
              <div class="stat-item">
                <div class="stat-val">${totalLikes}</div>
                <div class="stat-lbl">Total Likes</div>
              </div>
              <div class="stat-item">
                <div class="stat-val">${totalViews}</div>
                <div class="stat-lbl">Total Views</div>
              </div>
            </div>
            <div class="artist-actions">
              <button class="btn-follow" id="followBtn" onclick="toggleFollow()">♡ Follow</button>
              <button class="btn-share" onclick="shareProfile()"><i class="bi bi-share me-1"></i>Share</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        ${renderFeaturedSection()}
        <div class="section-head">
          <div class="section-eyebrow">Complete Works</div>
          <h2 class="section-title">All Artworks by ${artistName}</h2>
        </div>
        <div class="vx-nft-grid" id="nftGrid">
          ${artistNFTs.map(nft => renderNFTCard(nft)).join('')}
        </div>
      </div>
    `;
  } catch (err) { console.error('Render profile failed:', err); }
}

function renderFeaturedSection() {
  if (!featuredNFT) return '';
  return `
    <div class="featured-section">
      <div class="section-head">
        <div class="section-eyebrow">Spotlight</div>
        <h2 class="section-title">Featured Artwork</h2>
      </div>
      <div class="featured-artwork">
        ${featuredNFT.mediaType === 'video'
          ? `<video src="${featuredNFT.imageUrl}" class="featured-image" autoplay loop muted playsinline></video>`
          : `<img src="${featuredNFT.imageUrl}" alt="${featuredNFT.name}" class="featured-image">`}
        <div class="featured-info">
          <span class="featured-badge"><i class="bi bi-lightning-charge-fill me-1"></i>Random Pick</span>
          <h3 class="featured-title">${featuredNFT.name}</h3>
          <p class="featured-desc">${featuredNFT.description || 'A unique digital artwork by ' + artistName}</p>
          <div class="featured-price">${featuredNFT.price ? featuredNFT.price.toFixed(2) + ' ' + (featuredNFT.currency || 'ETH') : 'Not for sale'}</div>
          <a href="artwork.html?id=${featuredNFT._id}" class="featured-btn" data-testid="button-view-featured">
            View Artwork <i class="bi bi-arrow-right ms-1"></i>
          </a>
        </div>
      </div>
    </div>`;
}

function renderNFTCard(nft) {
  const statusBadge = nft.status === 'auction' ? 'auction' : nft.status === 'listed' ? '' : null;
  const badgeText = nft.status === 'auction' ? 'Auction' : nft.status === 'listed' ? 'For Sale' : '';
  return `
    <a href="artwork.html?id=${nft._id}" class="vx-nft-card" data-testid="card-nft-${nft._id}">
      <div class="vx-nft-image-container">
        <img src="${nft.imageUrl}" alt="${nft.name}" class="vx-nft-image">
        ${badgeText ? `<span class="vx-nft-badge ${statusBadge}">${badgeText}</span>` : ''}
      </div>
      <div class="vx-nft-content">
        <div class="vx-nft-title">${nft.name}</div>
        <div class="vx-nft-footer">
          <div class="vx-nft-price">
            ${nft.price ? nft.price.toFixed(2) + ' ' + (nft.currency || 'ETH') : 'Not listed'}
            <small>Current Price</small>
          </div>
          <div class="vx-nft-likes"><i class="bi bi-heart-fill" style="color:#ef4444;"></i> ${nft.likes || 0}</div>
        </div>
      </div>
    </a>`;
}

async function toggleFollow() {
  const btn = document.getElementById('followBtn');
  if (!btn) return;
  const userId = localStorage.getItem('userId');
  const aId = new URLSearchParams(window.location.search).get('id');
  if (!userId || !aId) { location.href = 'login.html'; return; }
  try {
    const r = await fetch('https://changes-sample.onrender.com/api/follow', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, targetUserId: aId }) });
    if (!r.ok) throw 0;
    const d = await r.json();
    btn.innerHTML = d.following ? '♥ Following' : '♡ Follow';
    btn.classList.toggle('following', d.following);
  } catch { alert('Please sign in to follow artists.'); }
}

function shareProfile() {
  if (navigator.share) navigator.share({ title: artistName, url: location.href });
  else navigator.clipboard.writeText(location.href).then(() => alert('Profile link copied!'));
}
</script>

      burger.classList.add('open');
      burger.setAttribute('aria-expanded','true');
      document.body.style.overflow='hidden';
    }
    function closeMenu(){
      drawer.classList.remove('open');
      mbar.style.display='';
      icon.className='bi bi-list';
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded','false');
      document.body.style.overflow='';
    }
    burger.addEventListener('click',function(){
      drawer.classList.contains('open')?closeMenu():openMenu();
    });
    overlay.addEventListener('click',closeMenu);
    document.querySelectorAll('.mob-panel .mob-link').forEach(function(l){
      l.addEventListener('click',closeMenu);
    });
    /* Search */
    var si = document.getElementById('searchInput');
    var sd = document.getElementById('searchDropdown');
    var mi = document.getElementById('mobSearchInput');
    var md = document.getElementById('mobSearchDrop');
    var t1,t2;
    function doSearchDrop(q,drop){
      if(!q||q.length<2){drop.classList.remove('show');return;}
      fetch('https://changes-sample.onrender.com/api/marketplace/search?q='+encodeURIComponent(q))
        .then(function(r){return r.json();})
        .then(function(res){
          if(!res||!res.length){drop.innerHTML='<div style="padding:.75rem 1rem;color:#94a3b8;font-size:.875rem;">No results found</div>';drop.classList.add('show');return;}
          var h='<div class="srch-lbl">Artworks</div>';
          h+=res.slice(0,5).map(function(n){
            return '<a href="artwork.html?id='+n._id+'" class="srch-item"><img src="'+n.imageUrl+'" alt="'+n.name+'"><div><h6>'+n.name+'</h6><small>by '+(n.creator||'Unknown')+' · '+n.category+'</small></div></a>';
          }).join('');
          drop.innerHTML=h; drop.classList.add('show');
        }).catch(function(){});
    }
    if(si){
      si.addEventListener('input',function(e){clearTimeout(t1);t1=setTimeout(function(){doSearchDrop(e.target.value,sd);},300);});
      si.addEventListener('focus',function(){if(si.value.length>=2)sd.classList.add('show');});
    }
    if(mi){
      mi.addEventListener('input',function(e){clearTimeout(t2);t2=setTimeout(function(){doSearchDrop(e.target.value,md);},300);});
    }
    document.addEventListener('click',function(e){
      if(!e.target.closest('.hdr-srch'))sd.classList.remove('show');
      if(!e.target.closest('.mob-srch-wrap'))md.classList.remove('show');
    });
    document.addEventListener('keydown',function(e){
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();if(si)si.focus();}
    });
  })();
  /* ── END SHARED NAVBAR JS ── */
</script>
</body>
</html>
